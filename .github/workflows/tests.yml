name: tests

on:
  push:
  pull_request:

jobs:
  phpunit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, sqlite3, intl, bcmath
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      # Full suite: framework-free Unit tests + Feature tests that boot the app
      # (Laravel 10) and drive the HTTP stack, including the funnel webhooks.
      - name: Run PHPUnit
        run: vendor/bin/phpunit
